name: V2Ray

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
    - name: Install tools
      run: sudo apt update && sudo apt install -y unzip curl

    - name: Download V2Ray
      run: |
        curl -L -o v2ray.zip https://github.com/v2fly/v2ray-core/releases/latest/download/v2ray-linux-64.zip
        unzip v2ray.zip
        chmod +x v2ray v2ctl

    - name: Write config
      run: |
        cat > config.json <<EOF
        {
          "inbounds": [{
            "port": 18080,
            "protocol": "vmess",
            "settings": {
              "clients": [{
                "id": "b831381d-6324-4d53-ad4f-8cda48b30811",
                "alterId": 0
              }]
            }
          }],
          "outbounds": [{"protocol": "freedom"}]
        }
        EOF

    - name: Run V2Ray
      run: |
        ./v2ray run -c config.json &
        sleep 3
        echo "✅ V2Ray running on port 18080"
        echo "UUID: b831381d-6324-4d53-ad4f-8cda48b30811"

    - name: Keep alive
      run: sleep 6h
