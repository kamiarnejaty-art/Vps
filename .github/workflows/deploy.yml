name: V2Ray

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup
      run: |
        wget https://github.com/v2fly/v2ray-core/releases/latest/download/v2ray-linux-64.zip
        unzip v2ray-linux-64.zip
        chmod +x v2ray v2ctl
        mkdir -p ~/.v2ray
        
    - name: Config
      run: |
        cat > config.json <<EOF
        {
          "inbounds": [{
            "port": 10086,
            "protocol": "vmess",
            "settings": {
              "clients": [{
                "id": "b831381d-6324-4d53-ad4f-8cda48b30811",
                "alterId": 0
              }]
            }
          }],
          "outbounds": [{"protocol": "freedom"}]
        }
        EOF
        
    - name: Run
      run: |
        ./v2ray run -c config.json &
        sleep 3
        curl -s http://localhost:10086/info
        echo "Server running on port 10086"
        
    - name: Keep
      run: sleep 6h
