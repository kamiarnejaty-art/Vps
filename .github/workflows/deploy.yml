name: Deploy Xray

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Install Xray
      run: |
        bash -c "$(curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh)" @ install
        
    - name: Create config
      run: |
        mkdir -p ~/xray
        cat > ~/xray/config.json <<EOF
        {
          "inbounds": [{
            "port": 8080,
            "protocol": "vmess",
            "settings": {
              "clients": [{"id": "b831381d-6324-4d53-ad4f-8cda48b30811", "alterId": 0}]
            }
          }],
          "outbounds": [{"protocol": "freedom"}]
        }
        EOF
        
    - name: Run Xray
      run: |
        ~/xray/xray run -c ~/xray/config.json &
        sleep 5
        echo "IP: $(curl -s ifconfig.me)"
        echo "Port: 8080"
        echo "UUID: b831381d-6324-4d53-ad4f-8cda48b30811"
        
    - name: Keep alive
      run: |
        while true; do sleep 3600; done
